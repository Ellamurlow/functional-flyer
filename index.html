<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furniture Wanted — Moving June 1st 🙏</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5ede0;
    --paper: #faf5ed;
    --dark: #1c1207;
    --terra: #c8512a;
    --terra-light: #e8784f;
    --sage: #5a7a5e;
    --sage-light: #d4e8d6;
    --warm-mid: #8c6a4a;
    --rule: #d4c0a8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--cream);
    color: var(--dark);
    font-family: 'Lora', Georgia, serif;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.5;
  }
  .tape {
    background: var(--terra);
    color: #fff;
    text-align: center;
    padding: 9px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .hero {
    background: var(--dark);
    padding: 64px 32px 56px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: repeating-linear-gradient(90deg, var(--terra) 0px, var(--terra) 12px, transparent 12px, transparent 20px);
  }
  .hero-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--terra-light);
    border: 1px solid var(--terra);
    padding: 5px 14px;
    border-radius: 2px;
    margin-bottom: 28px;
  }
  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(52px, 12vw, 96px);
    font-weight: 800;
    color: var(--cream);
    line-height: 0.92;
    letter-spacing: -2px;
    margin-bottom: 6px;
  }
  .hero h1 .italic {
    font-family: 'Lora', serif;
    font-style: italic;
    font-weight: 400;
    color: var(--terra-light);
    font-size: 0.85em;
  }
  .hero-desc {
    margin-top: 24px;
    font-size: 16px;
    font-style: italic;
    color: rgba(245, 237, 224, 0.55);
    line-height: 1.7;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
  }
  .hero-emoji {
    font-size: 48px;
    display: block;
    margin-top: 28px;
    animation: float 3.5s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50% { transform: translateY(-10px) rotate(2deg); }
  }
  .wrap { max-width: 680px; margin: 0 auto; padding: 0 24px; }
  .situation { padding: 52px 0 40px; border-bottom: 1px solid var(--rule); }
  .section-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--terra);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--rule); }
  .situation p { font-size: 18px; line-height: 1.8; color: #3a2a1a; }
  .situation p strong { font-weight: 600; color: var(--terra); }
  .callout-box {
    margin-top: 24px;
    background: var(--dark);
    color: var(--cream);
    border-radius: 12px;
    padding: 22px 26px;
    font-size: 15px;
    line-height: 1.75;
    font-style: italic;
  }
  .callout-box strong { font-style: normal; color: var(--terra-light); }
  .categories { padding: 44px 0; border-bottom: 1px solid var(--rule); }
  .cat-section { margin-bottom: 32px; }
  .cat-label {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--warm-mid);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tag-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--paper);
    border: 1.5px solid var(--rule);
    border-radius: 6px;
    padding: 8px 13px;
    font-size: 13.5px;
    color: var(--dark);
    line-height: 1;
    transition: all 0.15s;
    cursor: default;
  }
  .tag:hover {
    background: #fff;
    border-color: var(--terra);
    color: var(--terra);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(200,81,42,0.12);
  }
  .tag .e { font-size: 15px; }
  .disclaimer { padding: 40px 0; border-bottom: 1px solid var(--rule); }
  .big-quote {
    font-family: 'Lora', serif;
    font-size: clamp(22px, 5vw, 32px);
    font-style: italic;
    line-height: 1.4;
    color: var(--dark);
    text-align: center;
    padding: 0 12px;
  }
  .big-quote em { color: var(--terra); font-style: normal; font-weight: 600; }
  .fine-print { margin-top: 20px; text-align: center; font-size: 13.5px; color: var(--warm-mid); font-style: italic; line-height: 1.7; }
  .pickup-section { padding: 40px 0; border-bottom: 1px solid var(--rule); }
  .pickup-card {
    background: var(--sage-light);
    border-radius: 14px;
    padding: 24px 28px;
    display: flex;
    align-items: flex-start;
    gap: 18px;
    border: 1.5px solid #b4d4b8;
  }
  .pickup-card .icon { font-size: 32px; flex-shrink: 0; margin-top: 2px; }
  .pickup-card h3 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--sage); margin-bottom: 6px; }
  .pickup-card p { font-size: 14px; color: #3d5e40; line-height: 1.65; }
  .contact { padding: 48px 0 56px; }
  .contact-head { text-align: center; margin-bottom: 32px; }
  .contact-head h2 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(30px, 8vw, 48px);
    font-weight: 800;
    color: var(--dark);
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 10px;
  }
  .contact-head p { font-size: 14px; font-style: italic; color: var(--warm-mid); }
  .phone-stack { display: flex; flex-direction: column; gap: 12px; }
  .phone-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-decoration: none;
    background: var(--dark);
    border-radius: 14px;
    padding: 20px 26px;
    transition: transform 0.15s;
    position: relative;
    overflow: hidden;
  }
  .phone-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--terra);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s ease;
    border-radius: 14px;
  }
  .phone-btn:hover::before { transform: scaleX(1); }
  .phone-btn:hover { transform: translateY(-2px); }
  .num-wrap { display: flex; flex-direction: column; gap: 2px; position: relative; z-index: 1; }
  .contact-name {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--terra-light);
  }
  .phone-btn .num {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--cream);
    letter-spacing: -0.5px;
  }
  .phone-btn .cta-pill {
    position: relative;
    z-index: 1;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--dark);
    background: var(--cream);
    padding: 6px 14px;
    border-radius: 50px;
    font-weight: 500;
    white-space: nowrap;
  }
  .media-note { text-align: center; margin-top: 18px; font-size: 13px; font-style: italic; color: var(--warm-mid); line-height: 1.6; }
  footer {
    background: var(--dark);
    text-align: center;
    padding: 24px 20px;
    font-size: 13px;
    font-style: italic;
    color: rgba(245,237,224,0.4);
    line-height: 1.7;
  }
